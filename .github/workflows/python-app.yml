name: Python application
 
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: compilar projeto
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test app
      run: |
        PYTHONPATH=. pytest tests/ -v --tb=short

  imagem:
    name: construindo imagem no docker
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: login no docker
        uses: docker/login-action@v4.1.0
        with:
           username: ${{secrets.DOCKER_USUARIO}}
           password: ${{secrets.DOCKER_PWD}}
         
      - name: Build e Publish DockerHub
        uses: docker/build-push-action@v7.1.0
        with:
          push: true
         
          tags: |            
            pedpalma/senai_ci_cd_aws:latest
            pedpalma/senai_ci_cd_aws:${{github.sha}}
  
  DEPLOY:
      name: EC2
      runs-on: ubuntu-latest
      needs: imagem

      steps:
         - name: Deploy via SSH
           uses: appleboy/ssh-action@v1.0.3
           with:

             host: ${{secrets.EC2_HOST}}
             username: ${{secrets.EC2_USER}}
             key: ${{secrets.KEY}}
             script: |
                sudo docker pull pedpalma/senai_ci_cd_aws:latest

                sudo docker stop senai_ci_cd_aws 2>/dev/null || true
                sudo docker rm senai_ci_cd_aws 2>/dev/null ||true

                sudo docker run --name senai_ci_cd_aws -d --restart unless-stopped -p 80:8080 pedpalma/senai_ci_cd_aws:latest

                sleep 5
                curl -f http://localhost:80/health || exit 1
                echo "Deploy feito com sucesso"
